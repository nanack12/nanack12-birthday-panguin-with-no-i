<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BirthdayOS</title>
  <style>
    :root { --bg:#050806; --panel:#0a100c; --green:#81ff9b; --dim:#4e9c5d; --amber:#ffd166; --line:#23472b; --danger:#ff7a7a; }
    * { box-sizing:border-box; }
    html,body { min-height:100%; margin:0; background:var(--bg); color:var(--green); }
    body { font-family:"Courier New",ui-monospace,monospace; display:grid; place-items:center; padding:18px; overflow-x:hidden; }
    body::before { content:""; position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,rgba(255,255,255,.025),rgba(255,255,255,.025) 1px,transparent 1px,transparent 4px); z-index:5; }
    .terminal { width:min(920px,100%); min-height:min(700px,calc(100vh - 36px)); border:1px solid var(--line); border-radius:12px; background:radial-gradient(circle at 50% 10%,#102016 0,var(--panel) 45%,#050806 100%); box-shadow:0 0 45px rgba(80,255,120,.09),inset 0 0 45px rgba(0,0,0,.55); overflow:hidden; display:flex; flex-direction:column; }
    .topbar { height:38px; padding:0 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; color:var(--dim); font-size:12px; }
    .lights { display:flex; gap:7px; } .light { width:9px;height:9px;border-radius:50%;background:var(--line); } .light:first-child{background:#ff6b6b}.light:nth-child(2){background:#ffd166}.light:nth-child(3){background:#70e080}
    main { flex:1; padding:clamp(22px,5vw,54px); padding-bottom:94px; position:relative; }
    .prompt { color:var(--dim); font-size:13px; margin-bottom:22px; }
    h1 { color:var(--amber); font-size:clamp(27px,6vw,58px); line-height:.95; margin:0 0 18px; letter-spacing:-2px; text-shadow:0 0 16px rgba(255,209,102,.2); }
    h2 { color:var(--amber); margin:0 0 20px; font-size:clamp(22px,4vw,34px); }
    p { line-height:1.65; margin:8px 0; } .muted { color:var(--dim); } .danger { color:var(--danger); }
    .boot-lines { min-height:260px; } .boot-line { margin:8px 0; opacity:0; animation:appear .2s forwards; } @keyframes appear{to{opacity:1}}
    .progress { height:12px; border:1px solid var(--line); margin:24px 0; max-width:520px; padding:2px; } .progress span { display:block;height:100%;width:0;background:var(--green);box-shadow:0 0 12px var(--green);transition:width 1.4s ease; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:26px; }
    button { font:inherit; color:var(--green); background:#0b160e; border:1px solid var(--line); border-radius:5px; padding:15px 16px; text-align:left; cursor:pointer; min-height:52px; transition:.15s ease; }
    button:hover,button:focus-visible { color:var(--bg);background:var(--green);border-color:var(--green);outline:none;box-shadow:0 0 16px rgba(129,255,155,.28);transform:translateY(-1px); }
    button small { display:block; opacity:.65; margin-top:5px; }
    .primary { border-color:var(--amber); color:var(--amber); }
    .card { border-left:3px solid var(--line); background:rgba(6,15,9,.72); padding:18px 20px; margin:14px 0; line-height:1.7; }
    .stats { display:grid;grid-template-columns:120px 1fr;gap:11px 16px;max-width:560px; } .bar { display:inline-block;width:min(280px,50vw);height:10px;border:1px solid var(--line);vertical-align:middle; } .bar::after { content:"";display:block;height:100%;width:var(--value);background:var(--green); }
    .nav { position:absolute;left:0;right:0;bottom:0;border-top:1px solid var(--line);display:flex;gap:8px;padding:12px clamp(14px,3vw,28px);background:rgba(5,8,6,.96);z-index:4; }
    .nav button { padding:8px 12px;min-height:38px;font-size:12px;text-align:center; } .nav .spacer{flex:1}
    pre { white-space:pre; font-size:clamp(10px,2.5vw,23px); line-height:1.05; color:var(--amber); overflow:auto; margin:30px 0; padding:26px 18px; border:1px solid var(--amber); border-radius:8px; background:radial-gradient(circle,rgba(255,209,102,.09),transparent 68%); box-shadow:0 0 28px rgba(255,209,102,.12),inset 0 0 24px rgba(255,209,102,.06); text-shadow:0 0 7px var(--amber),0 0 18px rgba(255,209,102,.45); animation:cakeGlow 1.8s ease-in-out infinite alternate; }
    @keyframes cakeGlow { from { filter:brightness(.92); } to { filter:brightness(1.18); } }
    .help { position:fixed;inset:0;background:rgba(0,0,0,.78);display:grid;place-items:center;padding:18px;z-index:20; } .help[hidden]{display:none}.help-box{width:min(560px,100%);background:#08100a;border:1px solid var(--green);padding:26px;box-shadow:0 0 35px rgba(129,255,155,.16)}
    .cursor::after { content:"_";animation:blink .8s steps(1) infinite; } @keyframes blink{50%{opacity:0}}
    .screen { animation:screenIn .22s ease; } @keyframes screenIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    @media(max-width:620px){ body{padding:0}.terminal{min-height:100vh;border:0;border-radius:0}.grid{grid-template-columns:1fr}main{padding:24px 18px 92px}.topbar{position:sticky;top:0;background:#071009;z-index:6}.stats{grid-template-columns:92px 1fr}.nav button{padding:8px 9px}.nav{gap:5px} }
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <section class="terminal" aria-label="BirthdayOS 생일 카드">
    <header class="topbar"><span class="lights"><i class="light"></i><i class="light"></i><i class="light"></i></span><span id="windowTitle">BIRTHDAY_OS.EXE</span><span>v30.0</span></header>
    <main id="app" aria-live="polite"></main>
  </section>
  <aside class="help" id="helpModal" hidden role="dialog" aria-modal="true" aria-labelledby="helpTitle">
    <div class="help-box"><h2 id="helpTitle">HELP</h2><p>명령어 입력은 필요 없습니다. 화면의 버튼만 선택하면 됩니다.</p><p><b>BACK</b> 이전 화면 · <b>HOME</b> 메인 메뉴 · <b>HELP</b> 이 안내</p><button id="closeHelp" autofocus>[ 닫기 ]</button></div>
  </aside>
  <script>
    // ===== 여기만 수정하면 카드 내용이 바뀝니다 =====
    const CONFIG = {
      name: "팡근🐧",
      age: 30,
      from: "지똔",
      giftName: "새 장비 (실물은 잠시 후 공개)",
      coupleSince: "우리의 첫 commit부터",
      concertName: "생일 전야 콘서트 DLC",
      bandRole: "Lead Guitar / 합주 꼰대 담당",
      message: "30번째 버전 출시를 축하합니다. 알려진 버그까지 포함해서 계속 잘 써보겠습니다.",
      menuHint: "원하는 메뉴를 선택하세요 ❁´◡`❁",
      futureTodo: ["나랑 합주 더 많이 하기", "좋은 공연 더 많이 보기", "v31.0도 같이 업데이트하기"],
      cake: String.raw`
   )         *             !  !  !  !  !  !     (                   )
  (          (    *       |V||V||V||V||V||V|     )       )         (
   )   *      )           | || || || || || |    (       (   *       )
  (          (           (*******************)  *       *    )      *
   )          )  *       (        T O        )              (
  (     (    (       !   (    *         *    )   !           )    (
   )   * )    )     |V|  (   \|/       \|/   )  |V|    *    (      )
  (     (     *     | |  (<<<<<<<<<*>>>>>>>>>)  | |          )    (
   )     )        ((*******************************))       (  *   )
  (     (   *     ((           N A M E             ))        )    (
   ) *   )     !  ((   *    *   *    *    *    *   ))  !    (      )
  (     (     |V| ((  \|/  \|/ \|/  \|/  \|/  \|/  )) |V|    )    (
  *)     )    | | ((^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^)) | |   (      )
  (     (  (***********************************************) )  * (
   )     ) (*      |   |   __    ___    ___               *)(      )
  (     (  (*      |   |  /  \  |   \  |   \    \  /      *) )    (
  *      ) (*      |---| |----| |___/  |___/     \/       *)(      )
        (  (*  *   |   | |    | |      |         /   *    *) )    (
         ) (* \|/  |   | |    | |      |        /   \|/   *) *     )
        (  (*                                             *)      (
   )  *  ) (*}+{}+{}+{}+{}+{}+{}+{}+{}+{}+{}+{}+{}+{}+{}+{*)       )
  (     (  (*}-{}-{}-{}-{}-{}-{}-{}-{}-{}-{}-{}-{}-{}-{}-{*)       *
   ) ((********************************************************))
  (  ((}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*)) 
   ) ((      __                                                ))
  (  ((     |  \ _____  ___  _____        ___     __           ))
   ) ((     |__/   |   |   \   |   |   | |   \   /  \   \  /   ))
  (  ((     |  \   |   |___/   |   |---| |    > |----|   \/    ))
  *  ((  *  |__/ __|__ |  \    |   |   | |___/  |    |   /  *  ))
     (( \|/                                                \|/ ))
     ((}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*{}*))
  ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^`
    };
    // ================================================

    const app = document.querySelector('#app');
    const helpModal = document.querySelector('#helpModal');
    const historyStack = [];
    let currentScreen = 'boot';

    const screens = {
      menu: () => `<h1>BirthdayOS<br>v${CONFIG.age}.0</h1><p>환영합니다, ${CONFIG.name} USER.</p><p class="muted">${escapeHtml(CONFIG.menuHint)}</p><div class="grid">${menuButton('about','ABOUT','사용자 프로필')}${menuButton('status','STATUS','시스템 능력치')}${menuButton('changelog','CHANGELOG','v30.0 변경 사항')}${menuButton('bugs','BUG REPORT','알려진 문제')}${menuButton('gift','GIFT','암호화된 신규 장비','primary')}${menuButton('final','FINAL BUILD','생일 축하 화면','primary')}</div>`,
      about: () => `<h2>ABOUT.USER</h2><div class="card">NAME&nbsp;&nbsp;&nbsp;: ${CONFIG.name}<br>AGE&nbsp;&nbsp;&nbsp;&nbsp;: ${CONFIG.age}<br>CLASS&nbsp;&nbsp;: Developer<br>LOADOUT: Electric Guitar<br>ROLE&nbsp;&nbsp;&nbsp;: ${CONFIG.bandRole}</div><p class="muted">현재 실행 중: ${CONFIG.concertName}</p>`,
      status: () => `<h2>SYSTEM STATUS</h2><div class="stats"><span>DEV SKILL</span><span><i class="bar" style="--value:94%"></i> 94</span><span>GUITAR</span><span><i class="bar" style="--value:97%"></i> 97</span><span>STAMINA</span><span><i class="bar" style="--value:72%"></i> 30</span><span>KNEE HP</span><span><i class="bar" style="--value:30%"></i> 30</span><span>LUCK</span><span><i class="bar" style="--value:100%"></i> 999*</span></div><p class="muted">* ${CONFIG.from} 플러그인 보너스 적용됨. 이의 제기 불가.</p>`,
      changelog: () => `<h2>CHANGELOG v${CONFIG.age}.0</h2><div class="card">+ 연륜 1 증가<br>+ 기타 톤 판단력 향상<br>+ ${CONFIG.concertName} 설치<br>+ 합주 호흡 패치 적용<br>- 밤샘 후 회복 속도<br>-- “장비는 이제 충분해” 발언 신뢰도</div><p>Release status: <b>STABLE ENOUGH</b></p>`,
      bugs: () => `<h2>KNOWN ISSUES</h2><div class="card danger">BUG-001&nbsp; 기타를 잡으면 시간이 사라짐<br>BUG-002&nbsp; 좋은 톤을 찾으면 볼륨이 커짐<br>BUG-003&nbsp; 새 이팩터 검색 탭이 닫히지 않음<br>BUG-004&nbsp; 개발 얘기 시작 시 대화가 무한 루프</div><p>Status: <b>WILL NOT FIX</b></p>`,
      gift: () => `<h2>GIFT.DECRYPT</h2><p>암호화된 생일 장비를 해제하시겠습니까?</p><div class="card">TARGET: ${CONFIG.giftName}<br>OWNER: ${CONFIG.name}<br>LICENSE: 영구</div><div class="grid"><button data-action="unlockGift" class="primary">[ UNLOCK ]<small>선물 정보 해제</small></button><button data-screen="menu">[ MAYBE LATER ]</button></div>`,
      giftUnlocked: () => `<h2>NEW EQUIPMENT UNLOCKED</h2><div class="card"><b>${CONFIG.giftName}</b><br><br>획득 조건: Level ${CONFIG.age} 달성<br>장착 효과: 외출 준비 속도 +10<br>지급 방식: 잠시 후 현실 세계에서 전달</div><button data-screen="final" class="primary">[ CONTINUE TO FINAL BUILD ]</button>`,
      final: () => `<h2>BUILD COMPLETE</h2><p>${CONFIG.message}</p><pre aria-label="ASCII 아트 생일 케이크">${escapeHtml(CONFIG.cake)}</pre><div class="card">HAPPY BIRTHDAY, ${CONFIG.name.toUpperCase()}!<br>FROM: ${CONFIG.from}<br>SINCE: ${CONFIG.coupleSince}</div><p class="cursor">다음 버전도 함께 빌드 예정</p><button data-screen="future">[ VIEW NEXT SPRINT ]</button>`,
      future: () => `<h2>NEXT SPRINT</h2><div class="card">${CONFIG.futureTodo.map((item,index)=>`[ ] TODO-${String(index+1).padStart(2,'0')}: ${escapeHtml(item)}`).join('<br>')}</div><p>Deployment date: 천천히, 같이.</p><button data-screen="final" class="primary">[ CAKE 다시 보기 ]</button>`
    };

    function escapeHtml(value){ return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char])); }
    function menuButton(screen,label,description,className=''){ return `<button data-screen="${screen}" class="${className}">[ ${label} ]<small>${description}</small></button>`; }
    function nav(){ return `<nav class="nav" aria-label="고정 탐색"><button data-action="help">HELP</button><span class="spacer"></span><button data-action="back" ${historyStack.length ? '' : 'disabled'}>BACK</button><button data-action="home">HOME</button></nav>`; }
    function render(screen, remember=true){ if(remember && currentScreen !== screen && currentScreen !== 'boot') historyStack.push(currentScreen); currentScreen=screen; app.innerHTML=`<div class="screen"><div class="prompt">C:\\BIRTHDAY\\${screen.toUpperCase()}&gt;</div>${screens[screen]()}</div>${nav()}`; app.querySelector('button:not([disabled])')?.focus({preventScroll:true}); }
    function showBoot(){
      const lines=[`Booting BirthdayOS v${CONFIG.age}.0...`,'[ OK ] Developer runtime','[ OK ] Electric Guitar driver','[ OK ] Concert DLC','[ OK ] Girlfriend plugin','No critical errors found. Suspicious.'];
      app.innerHTML=`<div class="boot-lines" id="bootLines"></div><div class="progress"><span id="bootProgress"></span></div><button id="skipBoot">[ SKIP / START ]</button>${nav()}`;
      const target=document.querySelector('#bootLines'); lines.forEach((line,i)=>setTimeout(()=>target?.insertAdjacentHTML('beforeend',`<div class="boot-line">${escapeHtml(line)}</div>`),i*350));
      requestAnimationFrame(()=>document.querySelector('#bootProgress').style.width='100%');
      const timer=setTimeout(()=>render('menu',false),lines.length*350+700);
      document.querySelector('#skipBoot').addEventListener('click',()=>{clearTimeout(timer);render('menu',false)});
    }
    function goBack(){ const previous=historyStack.pop(); render(previous || 'menu',false); }
    app.addEventListener('click',event=>{ const button=event.target.closest('button'); if(!button)return; if(button.dataset.screen)render(button.dataset.screen); if(button.dataset.action==='home'){historyStack.length=0;render('menu',false)} if(button.dataset.action==='back')goBack(); if(button.dataset.action==='help')openHelp(); if(button.dataset.action==='unlockGift')render('giftUnlocked'); });
    function openHelp(){helpModal.hidden=false;document.querySelector('#closeHelp').focus()}
    function closeHelp(){helpModal.hidden=true;app.querySelector('button:not([disabled])')?.focus()}
    document.querySelector('#closeHelp').addEventListener('click',closeHelp);
    helpModal.addEventListener('click',event=>{if(event.target===helpModal)closeHelp()});
    document.addEventListener('keydown',event=>{if(event.key==='Escape'&&!helpModal.hidden)closeHelp()});
    showBoot();
  </script>
</body>
</html>
